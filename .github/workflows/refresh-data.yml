name: Refresh movie data

# Regenerates the snapshot from imdbapi.dev and commits any changes. A push to the
# default branch then triggers Vercel's auto-deploy — so new movies and updated vote
# counts flow in without touching app code. (This is intentionally a GitHub Action,
# NOT Vercel Cron, because the refresh must COMMIT the regenerated JSON to the repo.)

on:
  schedule:
    - cron: '17 6 * * 1' # every Monday 06:17 UTC
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build data snapshot
        run: npm run build:data

      - name: Verify the app still builds
        run: npm run build

      - name: Commit & push if the data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/data server/data)" ]; then
            git add public/data server/data
            git commit -m "chore(data): refresh movie snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes."
          fi
